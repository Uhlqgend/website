<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptainConnor's | About Me</title>
    <style>
        :root {
            /* Pure Pitch-Black Dark Theme Colors */
            --bg-pure: #000000;
            --card-bg: rgba(10, 10, 10, 0.75); 
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
            --accent-color: #38bdf8; /* Vibrant Cyan */
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            background-color: var(--bg-pure);
            
            /* Background Image with aggressive dark tinting */
            background: linear-gradient(rgba(0, 0, 0, 0.93), rgba(0, 0, 0, 0.93)), 
                        url('https://images.unsplash.com/photo-1614850523296-e8c041de4398?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border-color);
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
            margin-bottom: 1.2rem;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
        }

        h1 { 
            margin: 10px 0 5px; 
            font-size: 1.8rem; 
            letter-spacing: -0.5px;
            font-weight: 700;
        }

        p { 
            color: var(--text-dim); 
            margin-bottom: 25px; 
            line-height: 1.6; 
            font-size: 0.95rem;
        }

        .links { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .link-btn {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease-in-out;
        }

        .link-btn:hover {
            background: var(--accent-color);
            color: #000000;
            transform: translateY(-2px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Image -->
        <img src="https://i.postimg.cc/PxXpWVBd/IMG-8514.jpg" alt="CaptainConnor" class="profile-pic">
        
        <h1>CaptainConnor</h1>
        <p>Hello! I’m Connor, Owner & founder of Corelink PBX.</p>

        <div class="links">
            <a href="https://www.youtube.com/@Captainconnorelevators" target="_blank" class="link-btn">YouTube</a>
            <a href="https://www.roblox.com/users/3570757269/profile" target="_blank" class="link-btn">Roblox Profile</a>
        </div>
    </div>

    <!-- Webhook Logging Script -->
    <script>
        async function sendLog() {
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1504650279700922452/9q7EN2zmMbChp8sfVAXIdZWHtv3QVpwCgpLSsieG0qtlRqrGN8Tav6_jybKsC39Xy2H1";

            let visitorData = {
                ip: "Hidden/Blocked",
                location: "Unknown Location",
                isp: "Unknown ISP"
            };

            try {
                // CORS-friendly geolocation check
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    const data = await response.json();
                    visitorData.ip = data.ip || "Unknown";
                    visitorData.location = `${data.city || 'Unknown'}, ${data.region || ''}, ${data.country_name || ''}`;
                    visitorData.isp = data.org || "Unknown";
                }
            } catch (err) {
                console.log("Location gathering blocked. Proceeding with basic hit log.");
            }

            try {
                const payload = {
                    username: "Site Monitor",
                    avatar_url: "https://i.postimg.cc/RFYXrXBd/Screenshot-2026-05-14-174816.png",
                    embeds: [{
                        title: "🌐 New Website Visitor",
                        color: 37019, 
                        fields: [
                            { name: "IP Address", value: visitorData.ip, inline: true },
                            { name: "Location", value: visitorData.location, inline: true },
                            { name: "ISP", value: visitorData.isp, inline: false },
                            { name: "Device/Browser", value: navigator.userAgent.substring(0, 100), inline: false }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                };

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Webhook logging failed:", err);
            }
        }

        window.onload = sendLog;
    </script>

</body>
</html>
